<head>

  <style>

      background-size: 600% 600%;
      animation: bgMove 10s ease infinite;
      color: #00ff9c;
      text-align: center;
    }@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

header {
  padding: 20px;
  background: #000;
  box-shadow: 0 0 15px #00ff9c;
}

h1 {
  margin: 0;
  font-size: 28px;
}

.container {
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid #00ff9c;
  border-radius: 10px;
  padding: 20px;
  max-width: 400px;
  margin: 20px auto;
  box-shadow: 0 0 15px #00ff9c33;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

button {
  background: #00ff9c;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

input {
  padding: 10px;
  width: 80%;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

#result {
  margin-top: 15px;
  font-weight: bold;
}

#loading {
  display: none;
  margin-top: 15px;
}

.spinner {
  border: 4px solid #222;
  border-top: 4px solid #00ff9c;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 0 auto;

@keyframes spin {

#unlockedContent {

a.button-link {

  </style>
</head>

  </div>  <script>

</html>
